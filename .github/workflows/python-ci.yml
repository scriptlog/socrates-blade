name: Python CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Pylint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint
        run: |
          pylint --disable=C0114,C0115,C0116 socrates-blade.py config.py || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scanrequirements.txt

      - name: Run Python Unit Tests
        run: |
          python -m pytest tests/python/unit/ -v

  bash-test:
    name: Bash Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run BATS tests
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
          bats tests/bash/run-scan.sh.test.bats

      - name: Run URL Validator tests
        run: |
          bash tests/bash/test_url_validator.sh

  security-scan:
    name: Security Scan Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scanrequirements.txt

      - name: Run dry-run scan
        run: |
          chmod +x run-scan.sh
          ./run-scan.sh --dry-run --no-validate http://localhost